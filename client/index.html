<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume Parser</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
  <div class="max-w-3xl mx-auto p-8">
    
    <header class="mb-10">
      <h1 class="text-4xl font-bold mb-2">Resume Parser</h1>
      <p class="text-zinc-400">Extract structured data from raw resume text or PDF using Llama 3.3 + Zod validation.</p>
    </header>

    <!-- TEXT INPUT -->
    <section class="mb-10 p-6 bg-zinc-900 rounded-xl border border-zinc-800">
      <h2 class="text-xl font-semibold mb-4">Paste resume text</h2>
      <textarea id="resumeText" rows="8" 
        class="w-full p-3 bg-zinc-950 border border-zinc-700 rounded-lg text-sm font-mono"
        placeholder="Paste resume text here..."></textarea>
      <button onclick="parseText()" 
        class="mt-3 px-5 py-2 bg-blue-600 hover:bg-blue-500 rounded-lg font-medium">
        Parse Text
      </button>
    </section>

    <!-- PDF UPLOAD -->
    <section class="mb-10 p-6 bg-zinc-900 rounded-xl border border-zinc-800">
      <h2 class="text-xl font-semibold mb-4">Upload PDF</h2>
      <input type="file" id="pdfFile" accept="application/pdf"
        class="block w-full text-sm text-zinc-400 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-blue-600 file:text-white hover:file:bg-blue-500"/>
      <button onclick="parsePDF()" 
        class="mt-3 px-5 py-2 bg-blue-600 hover:bg-blue-500 rounded-lg font-medium">
        Parse PDF
      </button>
    </section>

    <!-- RESULT -->
    <section id="resultSection" class="hidden p-6 bg-zinc-900 rounded-xl border border-zinc-800">
      <h2 class="text-xl font-semibold mb-4">Result</h2>
      <pre id="result" class="text-sm bg-zinc-950 p-4 rounded-lg overflow-x-auto"></pre>
    </section>

    <!-- LOADING -->
    <div id="loading" class="hidden text-center text-zinc-400 my-6">
      Processing... (first call may take 30s on Render free tier)
    </div>

  </div>

<script>
const API_URL = "https://resume-parser-backend-fyo8.onrender.com";    // 🔁 already correct

async function parseText() {
  const text = document.getElementById('resumeText').value;
  if (!text.trim()) return showResult({error: "Please paste some resume text."});
  showLoading(true);
  try {
    const res = await fetch(`${API_URL}/api/resume/parse`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({resumeText: text})
    });
    const data = await res.json();
    showResult(data);
  } catch (err) {
    showResult({error: err.message});
  } finally {
    showLoading(false);
  }
}

async function parsePDF() {
  const file = document.getElementById('pdfFile').files[0];
  if (!file) return showResult({error: "Please select a PDF."});
  showLoading(true);
  try {
    const formData = new FormData();
    formData.append('file', file);
    const res = await fetch(`${API_URL}/api/resume/upload`, {
      method: "POST",
      body: formData
    });
    const data = await res.json();
    showResult(data);
  } catch (err) {
    showResult({error: err.message});
  } finally {
    showLoading(false);
  }
}

function showResult(data) {
  document.getElementById('resultSection').classList.remove('hidden');
  document.getElementById('result').textContent = JSON.stringify(data, null, 2);
}

function showLoading(on) {
  document.getElementById('loading').classList.toggle('hidden', !on);
}
</script>

</body>
</html>
